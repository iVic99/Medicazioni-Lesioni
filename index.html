<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Algoritmo di scelta della medicazione</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Mono:wght@500;600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#EEF1EC;
    --paper-2:#E4E9E2;
    --ink:#182420;
    --ink-soft:#4B5A54;
    --line:#C9D2C6;
    --teal:#2C5F58;
    --teal-deep:#1D433D;
    --necrosi:#1C1B18;
    --slough:#C8952A;
    --granulazione:#A63B2E;
    --riepitelizzazione:#CE8C8C;
    --warn-bg:#F4E6D7;
    --warn-ink:#7A4A17;
    --danger-bg:#F3DEDA;
    --danger-ink:#7A2A1E;
    --radius:14px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:'Inter',system-ui,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  .wrap{
    max-width:760px;
    margin:0 auto;
    padding:28px 20px 60px;
  }
  .masthead{
    display:flex;
    align-items:baseline;
    justify-content:space-between;
    border-bottom:1.5px solid var(--line);
    padding-bottom:16px;
    margin-bottom:28px;
    gap:12px;
    flex-wrap:wrap;
  }
  .masthead-eyebrow{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.12em;
    text-transform:uppercase;
    color:var(--teal-deep);
    font-weight:600;
  }
  h1{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:clamp(26px,4.2vw,34px);
    line-height:1.08;
    margin:6px 0 0;
    letter-spacing:-.01em;
  }
  .tagline{
    font-size:13.5px;
    color:var(--ink-soft);
    max-width:220px;
    text-align:right;
    line-height:1.4;
  }
  @media (max-width:560px){
    .masthead{flex-direction:column;}
    .tagline{text-align:left;max-width:none;}
  }

  /* progress */
  .progress{
    display:flex;
    gap:6px;
    margin-bottom:26px;
  }
  .progress .seg{
    flex:1;
    height:5px;
    border-radius:3px;
    background:var(--line);
    position:relative;
    overflow:hidden;
  }
  .progress .seg.done, .progress .seg.active{
    background:var(--teal);
  }
  .step-label{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    color:var(--ink-soft);
    letter-spacing:.06em;
    margin-bottom:6px;
  }

  .card{
    background:#fff;
    border:1.5px solid var(--line);
    border-radius:var(--radius);
    padding:28px 26px 26px;
  }
  .question{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:clamp(19px,3vw,23px);
    line-height:1.28;
    margin:2px 0 6px;
  }
  .question-note{
    font-size:13.5px;
    color:var(--ink-soft);
    margin-bottom:20px;
    line-height:1.5;
  }
  .options{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .opt{
    display:flex;
    align-items:flex-start;
    gap:12px;
    text-align:left;
    width:100%;
    border:1.5px solid var(--line);
    background:var(--paper);
    border-radius:10px;
    padding:14px 16px;
    cursor:pointer;
    font-family:inherit;
    font-size:15px;
    color:var(--ink);
    transition:border-color .12s ease, background .12s ease, transform .08s ease;
  }
  .opt:hover{border-color:var(--teal); background:#fff;}
  .opt:active{transform:scale(0.995);}
  .opt.selected{
    border-color:var(--teal);
    background:#fff;
    box-shadow:0 0 0 2px var(--teal) inset;
  }
  .opt .swatch{
    width:16px;height:16px;border-radius:4px;flex:none;margin-top:2px;
    border:1px solid rgba(0,0,0,.15);
  }
  .opt .opt-title{font-weight:600; display:block;}
  .opt .opt-sub{display:block; font-size:13px; color:var(--ink-soft); margin-top:2px; font-weight:400;}

  .nav-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-top:24px;
  }
  button.nav-btn{
    font-family:'Inter',sans-serif;
    font-weight:600;
    font-size:14px;
    border-radius:9px;
    padding:11px 18px;
    cursor:pointer;
    border:1.5px solid var(--line);
    background:#fff;
    color:var(--ink);
  }
  button.nav-btn.primary{
    background:var(--teal);
    border-color:var(--teal);
    color:#fff;
  }
  button.nav-btn:disabled{
    opacity:.35;
    cursor:not-allowed;
  }
  button.nav-btn:focus-visible, .opt:focus-visible{
    outline:3px solid var(--teal-deep);
    outline-offset:2px;
  }

  /* results */
  .result-head{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:4px;
  }
  .result-head .dot{width:12px;height:12px;border-radius:50%;flex:none;}
  .result-title{
    font-family:'Fraunces',serif;
    font-weight:600;
    font-size:22px;
  }
  .obj-flag{
    display:inline-block;
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    letter-spacing:.06em;
    text-transform:uppercase;
    padding:4px 9px;
    border-radius:20px;
    background:var(--teal-deep);
    color:#fff;
    margin-bottom:16px;
  }
  .section-block{
    margin-top:22px;
    padding-top:18px;
    border-top:1px solid var(--line);
  }
  .section-block h3{
    font-family:'IBM Plex Mono',monospace;
    font-size:11.5px;
    letter-spacing:.08em;
    text-transform:uppercase;
    color:var(--teal-deep);
    margin:0 0 10px;
  }
  .pill-row{display:flex; flex-wrap:wrap; gap:8px; margin-bottom:6px;}
  .pill{
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:20px;
    padding:6px 13px;
    font-size:13.5px;
    font-weight:600;
  }
  .pill.avoid{
    background:var(--danger-bg);
    color:var(--danger-ink);
    border-color:transparent;
  }

  /* card illustrate con icona per le medicazioni */
  .item-grid{
    display:grid;
    grid-template-columns:repeat(auto-fill, minmax(148px,1fr));
    gap:10px;
    margin-bottom:6px;
  }
  .item-card{
    background:var(--paper-2);
    border:1px solid var(--line);
    border-radius:12px;
    padding:12px 12px 11px;
    display:flex;
    flex-direction:column;
    gap:8px;
  }
  .item-card.avoid{
    background:var(--danger-bg);
    border-color:transparent;
  }
  .item-card .icon-box{
    width:38px;height:38px;
    border-radius:9px;
    background:#fff;
    border:1px solid var(--line);
    display:flex;
    align-items:center;
    justify-content:center;
    flex:none;
  }
  .item-card.avoid .icon-box{border-color:transparent;}
  .item-card .icon-box svg{width:22px;height:22px;display:block;}
  .item-card .item-label{
    font-size:13.5px;
    font-weight:600;
    line-height:1.3;
  }
  .item-card.avoid .item-label{color:var(--danger-ink);}
  ul.notes{
    margin:6px 0 0;
    padding-left:20px;
    font-size:14.5px;
    line-height:1.55;
  }
  ul.notes li{margin-bottom:6px;}
  .warn-box{
    background:var(--warn-bg);
    color:var(--warn-ink);
    border-radius:10px;
    padding:12px 14px;
    font-size:13.5px;
    line-height:1.5;
    margin-top:10px;
  }
  .danger-box{
    background:var(--danger-bg);
    color:var(--danger-ink);
    border-radius:10px;
    padding:12px 14px;
    font-size:13.5px;
    line-height:1.5;
    margin-top:10px;
    font-weight:600;
  }
  .summary-strip{
    display:flex;
    gap:8px;
    flex-wrap:wrap;
    margin:14px 0 4px;
  }
  .summary-strip span{
    font-family:'IBM Plex Mono',monospace;
    font-size:11px;
    color:var(--ink-soft);
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:6px;
    padding:4px 8px;
  }
  .disclaimer{
    margin-top:26px;
    font-size:12.5px;
    color:var(--ink-soft);
    line-height:1.55;
    border-top:1px dashed var(--line);
    padding-top:14px;
  }
  .footer-actions{
    display:flex;
    gap:10px;
    margin-top:20px;
    flex-wrap:wrap;
  }
  @media print{
    .nav-row, .footer-actions, .progress, .masthead .tagline{display:none;}
    body{background:#fff;}
    .card{border:none;}
  }
</style>
</head>
<body>
<div class="wrap">

  <div class="masthead">
    <div>
      <div class="masthead-eyebrow">S.T.A.R.T. — Le Medicazioni</div>
      <h1>Algoritmo di scelta<br>della medicazione</h1>
    </div>
    <div class="tagline">Percorso guidato secondo il modello T.I.M.E. — Tessuto, Infezione, Moisture (essudato), Edge (bordi/cute perilesionale)</div>
  </div>

  <div id="wizard-area"></div>

</div>

<script>
const STEPS = [
  {
    key: 'obiettivo',
    label: 'PASSO 1 · OBIETTIVO TERAPEUTICO',
    question: 'Qual è l\'obiettivo del trattamento?',
    note: 'La prima decisione a monte di tutto: si punta alla guarigione della lesione o al controllo dei sintomi in ottica di comfort?',
    options: [
      { value:'guarigione', title:'Guarigione', sub:'Lesione con potenziale di guarigione: si lavora su tessuto, essudato e infezione per far progredire la riparazione.' },
      { value:'palliazione', title:'Palliazione / comfort', sub:'Guarigione irrealistica (es. fine vita, ulcera ischemica non rivascolarizzabile): priorità a dolore, odore, essudato, dignità.' }
    ]
  },
  {
    key: 'tipoFerita',
    label: 'PASSO 2 · TIPO DI LESIONE',
    question: 'Che tipo di lesione stai trattando?',
    note: 'La causa della lesione determina gli interventi "a monte" (scarico, compressione, riduzione della pressione) senza i quali nessuna medicazione può funzionare da sola.',
    options: [
      { value:'acuta_semplice', title:'Ferita acuta semplice', sub:'Taglio chirurgico pulito, trauma superficiale, prima intenzione.' },
      { value:'acuta_complessa', title:'Ferita acuta complessa', sub:'Trauma con perdita di sostanza, lacero-contusa, ustione, ferita chirurgica complicata.' },
      { value:'ldp', title:'Lesione da pressione (LdP)', sub:'Sede tipica: sacro, trocantere, tallone. Da ischemia per pressione non alleviata.' },
      { value:'venosa', title:'Ulcera venosa', sub:'Terzo distale gamba, sovramalleolare; ipertensione venosa cronica.' },
      { value:'arteriosa', title:'Ulcera arteriosa (ischemica)', sub:'Piede/dita, molto dolorosa, da ridotta perfusione arteriosa.' },
      { value:'diabetica', title:'Ulcera diabetica (piede diabetico)', sub:'Zone di carico del piede; neuropatia e (micro/macro)angiopatia.' }
    ]
  },
  {
    key: 'tessuto',
    label: 'PASSO 3 · TESSUTO DEL LETTO (T di TIME)',
    question: 'Qual è il tessuto prevalente sul fondo della lesione?',
    note: 'Il colore del letto sintetizza la fase di guarigione: nero (necrosi), giallo (fibrina/slough), rosso (granulazione), rosa (riepitelizzazione).',
    options: [
      { value:'necrotico', title:'Necrotico secco / escara', sub:'Colore nero, tessuto devitalizzato secco.', swatch:'var(--necrosi)' },
      { value:'slough', title:'Fibrinoso / slough', sub:'Colore giallo, fase essudativa, tessuto non vitale umido.', swatch:'var(--slough)' },
      { value:'misto', title:'Misto (fibrina + granulazione)', sub:'Fondo disomogeneo, in fase di transizione.', swatch:'linear-gradient(135deg, var(--slough) 50%, var(--granulazione) 50%)' },
      { value:'granulazione', title:'Granulazione', sub:'Colore rosso, tessuto vitale neoformato.', swatch:'var(--granulazione)' },
      { value:'riepitelizzazione', title:'Riepitelizzazione', sub:'Colore rosa, bordi in avanzamento, fase finale.', swatch:'var(--riepitelizzazione)' }
    ]
  },
  {
    key: 'infezione',
    label: 'PASSO 4 · INFEZIONE / INFIAMMAZIONE (I di TIME)',
    question: 'Sono presenti segni di infezione o colonizzazione critica?',
    note: 'Segni locali: aumento di dolore, eritema, calore, edema, aumento essudato, cattivo odore, granulazione "spenta" o friabile.',
    options: [
      { value:'assente', title:'Nessun segno', sub:'Nessun segno locale né sistemico di infezione.' },
      { value:'critica', title:'Colonizzazione critica sospetta', sub:'Odore, essudato aumentato, granulazione friabile, mancata evoluzione nonostante terapia standard.' },
      { value:'locale', title:'Infezione locale conclamata', sub:'Segni locali marcati, senza coinvolgimento sistemico.' },
      { value:'sistemica', title:'Infezione con segni sistemici', sub:'Febbre, brividi, tachicardia, leucocitosi: richiede terapia sistemica.' }
    ]
  },
  {
    key: 'essudato',
    label: 'PASSO 5 · ESSUDATO (M di TIME)',
    question: 'Quanto essudato produce la lesione?',
    note: 'Si può stimare anche dall\'imbibizione della medicazione precedente (percentuale di superficie bagnata).',
    options: [
      { value:'scarso', title:'Assente / scarso', sub:'Ferita asciutta o poco essudante.' },
      { value:'moderato', title:'Moderato', sub:'Da tenere sotto controllo senza macerare la cute.' },
      { value:'abbondante', title:'Abbondante / molto abbondante', sub:'Rischio di macerazione perilesionale e cattivo odore.' }
    ]
  },
  {
    key: 'perilesionale',
    label: 'PASSO 6 · CUTE PERILESIONALE (E di TIME)',
    question: 'Come si presenta la cute perilesionale (4–5 cm intorno alla lesione)?',
    note: 'Il "bordo" della lesione e la cute che la circonda condizionano fissaggio, adesivi e protezione.',
    options: [
      { value:'integra', title:'Integra', sub:'Colore, temperatura e integrità normali.' },
      { value:'macerata', title:'Macerata', sub:'Umida, biancastra, fragile per eccesso di essudato.' },
      { value:'fragile', title:'Fragile / rischio skin tear', sub:'Cute sottile, a rischio di lacerazione con adesivi standard.' }
    ]
  }
];

// ---- Libreria icone illustrative per categoria di medicazione ----
const ICONS = {
  garza: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="6" width="36" height="36" rx="3" stroke="currentColor" stroke-width="2"/><path d="M6 14h36M6 22h36M6 30h36M6 38h36M14 6v36M22 6v36M30 6v36M38 6v36" stroke="currentColor" stroke-width="1.1" opacity=".55"/></svg>`,
  idrogel: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M24 6c8 10 13 17 13 23a13 13 0 0 1-26 0c0-6 5-13 13-23Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><circle cx="20" cy="30" r="2.6" fill="currentColor"/><circle cx="27" cy="25" r="1.8" fill="currentColor" opacity=".6"/></svg>`,
  idrocolloide: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="7" y="16" width="34" height="16" rx="8" stroke="currentColor" stroke-width="2"/><path d="M13 24h22" stroke="currentColor" stroke-width="1.4" stroke-dasharray="2.5 3" opacity=".7"/></svg>`,
  foam: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="7" y="12" width="34" height="24" rx="5" stroke="currentColor" stroke-width="2"/><circle cx="15" cy="20" r="1.6" fill="currentColor"/><circle cx="24" cy="24" r="1.6" fill="currentColor"/><circle cx="33" cy="19" r="1.6" fill="currentColor"/><circle cx="18" cy="30" r="1.6" fill="currentColor"/><circle cx="30" cy="30" r="1.6" fill="currentColor"/></svg>`,
  fibre: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 12c6 4 6 8 0 12s-6 8 0 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M20 10c6 4 6 8 0 12s-6 8 0 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><path d="M31 12c6 4 6 8 0 12s-6 8 0 12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,
  film: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="8" width="32" height="32" rx="3" stroke="currentColor" stroke-width="2"/><path d="M28 8 L40 20" stroke="currentColor" stroke-width="2"/><path d="M28 8h6a6 6 0 0 1 6 6v6" stroke="currentColor" stroke-width="1.2" opacity=".5"/></svg>`,
  interfaccia: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="18" width="32" height="12" rx="4" stroke="currentColor" stroke-width="2"/><path d="M8 24h32" stroke="currentColor" stroke-width="1.2" stroke-dasharray="1 3.4" opacity=".8"/><path d="M14 12v6M24 10v8M34 12v6" stroke="currentColor" stroke-width="1.4" opacity=".6"/></svg>`,
  antimicrobica: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M24 6l14 5v11c0 10-6 16-14 20-8-4-14-10-14-20V11l14-5Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round"/><path d="M24 17v12M18 23h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,
  npwt: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="6" y="20" width="14" height="14" rx="2" stroke="currentColor" stroke-width="2"/><circle cx="32" cy="27" r="9" stroke="currentColor" stroke-width="2"/><path d="M23 27h1.5M20 27h1" stroke="currentColor" stroke-width="2"/><path d="M32 21v3M32 30v3M26 27h3M35 27h3" stroke="currentColor" stroke-width="1.4" opacity=".7"/></svg>`,
  barriera: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M24 6c9 3 15 3 15 3v13c0 10-6 16-15 20-9-4-15-10-15-20V9s6 0 15-3Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" opacity=".9"/></svg>`,
  fissaggio: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="24" r="15" stroke="currentColor" stroke-width="2"/><path d="M24 9v6M24 33v6M9 24h6M33 24h6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,
  superassorbente: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><rect x="8" y="10" width="32" height="28" rx="5" stroke="currentColor" stroke-width="2"/><path d="M24 17c4 4 6.5 7 6.5 10a6.5 6.5 0 1 1-13 0c0-3 2.5-6 6.5-10Z" fill="currentColor" opacity=".18" stroke="currentColor" stroke-width="1.6"/></svg>`,
  causale: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M9 34c6-14 10-14 15-22 5 8 9 8 15 22" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><path d="M9 34h30" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`,
  generico: `<svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="24" cy="24" r="15" stroke="currentColor" stroke-width="2"/><path d="M24 17v14M17 24h14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>`
};

function iconFor(text){
  const t = text.toLowerCase();
  if(t.includes('idrogel')) return ICONS.idrogel;
  if(t.includes('idrocolloide')) return ICONS.idrocolloide;
  if(t.includes('foam') || t.includes('schiuma')) return ICONS.foam;
  if(t.includes('idrofibra') || t.includes('alginato')) return ICONS.fibre;
  if(t.includes('superassorbente')) return ICONS.superassorbente;
  if(t.includes('film')) return ICONS.film;
  if(t.includes('interfacc') || t.includes('siliconat') || t.includes('garze grasse') || t.includes('bordo in silicone')) return ICONS.interfaccia;
  if(t.includes('argento') || t.includes('iodio') || t.includes('phmb') || t.includes('miele') || t.includes('antimicrobic')) return ICONS.antimicrobica;
  if(t.includes('pressione negativa') || t.includes('npwt')) return ICONS.npwt;
  if(t.includes('barriera') || t.includes('pasta') || t.includes('protettivo')) return ICONS.barriera;
  if(t.includes('fissaggio') || t.includes('bende non adesive') || t.includes('adesiv')) return ICONS.fissaggio;
  if(t.includes('garz') || t.includes('tradizional')) return ICONS.garza;
  return ICONS.generico;
}

let state = {};
let current = 0;

const area = document.getElementById('wizard-area');

function render(){
  if(current < STEPS.length){
    renderStep(STEPS[current]);
  } else {
    renderResult();
  }
}

function renderStep(step){
  const total = STEPS.length;
  let progressHtml = '<div class="progress">';
  for(let i=0;i<total;i++){
    let cls = i < current ? 'seg done' : (i === current ? 'seg active' : 'seg');
    progressHtml += `<div class="${cls}"></div>`;
  }
  progressHtml += '</div>';

  let optsHtml = '';
  step.options.forEach(opt => {
    const isSel = state[step.key] === opt.value;
    const swatch = opt.swatch ? `<div class="swatch" style="background:${opt.swatch}"></div>` : '';
    optsHtml += `
      <button class="opt ${isSel?'selected':''}" data-value="${opt.value}" type="button">
        ${swatch}
        <span>
          <span class="opt-title">${opt.title}</span>
          <span class="opt-sub">${opt.sub}</span>
        </span>
      </button>`;
  });

  area.innerHTML = `
    ${progressHtml}
    <div class="step-label">${step.label} · ${current+1} / ${total}</div>
    <div class="card">
      <div class="question">${step.question}</div>
      <div class="question-note">${step.note}</div>
      <div class="options">${optsHtml}</div>
      <div class="nav-row">
        <button class="nav-btn" id="backBtn" type="button" ${current===0?'disabled':''}>← Indietro</button>
        <button class="nav-btn primary" id="nextBtn" type="button" ${!state[step.key]?'disabled':''}>${current===STEPS.length-1?'Vedi risultato':'Avanti'} →</button>
      </div>
    </div>
  `;

  area.querySelectorAll('.opt').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state[step.key] = btn.dataset.value;
      render();
    });
  });
  document.getElementById('backBtn').addEventListener('click', ()=>{
    current = Math.max(0, current-1);
    render();
  });
  document.getElementById('nextBtn').addEventListener('click', ()=>{
    if(!state[step.key]) return;
    current++;
    render();
  });
}

// ---- Motore di raccomandazione ----
function computeResult(s){
  const rec = {
    primaria: [],
    secondaria: [],
    evitare: [],
    frequenza: '',
    causali: [],
    palliative: [],
    warnings: [],
    danger: []
  };

  const isPalliativo = s.obiettivo === 'palliazione';

  // --- Base per tessuto + essudato ---
  if(s.tessuto === 'necrotico'){
    if(s.essudato === 'scarso'){
      rec.primaria.push('Idrogel (debridement autolitico)');
      rec.primaria.push('Idrocolloide (se assenza di infezione)');
    } else if(s.essudato === 'moderato'){
      rec.primaria.push('Idrogel o idrocolloide');
      rec.primaria.push('Alginato/idrofibra se essudato in aumento');
    } else {
      rec.primaria.push('Alginato o idrofibra superassorbente');
      rec.warnings.push('Essudato abbondante su tessuto necrotico: rivaluta la necessità di debridement chirurgico/strumentale.');
    }
    rec.evitare.push('Medicazioni secche che aderiscono e non favoriscono l\'autolisi');
    rec.causali.push('Se necrosi massiva, ischemia critica o infezione sistemica: l\'algoritmo deve spostarsi verso debridement chirurgico/strumentale prima di qualsiasi medicazione avanzata.');
  }
  else if(s.tessuto === 'slough'){
    if(s.essudato === 'scarso'){
      rec.primaria.push('Idrogel o idrocolloide');
    } else if(s.essudato === 'moderato'){
      rec.primaria.push('Foam, alginato o idrofibra');
    } else {
      rec.primaria.push('Alginato o idrofibra superassorbente');
    }
    rec.causali.push('Obiettivo: proseguire il debridement e ridurre la componente fibrinosa.');
  }
  else if(s.tessuto === 'misto'){
    rec.primaria.push('Idrogel/idrocolloide come base');
    rec.primaria.push('Foam, alginato o idrofibra se essudato moderato-alto');
    rec.causali.push('Fondo disomogeneo: continuare il debridement selettivo mentre si protegge l\'area già in granulazione.');
  }
  else if(s.tessuto === 'granulazione'){
    if(s.essudato === 'scarso'){
      rec.primaria.push('Idrocolloide sottile o schiuma (foam) sottile');
    } else if(s.essudato === 'moderato'){
      rec.primaria.push('Foam, idrocolloide standard o idrofibra');
    } else {
      rec.primaria.push('Foam ad alto assorbimento, idrofibra o alginato');
      rec.warnings.push('Essudato abbondante su tessuto in granulazione: valuta superassorbenti o terapia a pressione negativa (NPWT) se la lesione lo consente.');
    }
    rec.evitare.push('Prodotti aggressivi tipo collagenasi enzimatica (non più indicati su tessuto già in granulazione)');
  }
  else if(s.tessuto === 'riepitelizzazione'){
    rec.primaria.push('Film trasparente, schiuma sottile o idrocolloide sottile');
    rec.primaria.push('Garze grasse o interfacce siliconate');
    rec.evitare.push('Medicazioni aggressive o molto assorbenti non necessarie in questa fase');
  }

  // --- Layer infezione ---
  if(s.infezione === 'critica'){
    rec.primaria.push('Aggiungi componente antimicrobica: argento, iodio (cadexomero), PHMB o miele medicale');
    rec.warnings.push('Uso limitato nel tempo (cicli di 2–4 settimane) con rivalutazione clinica; sospendere se la ferita migliora o se non si osserva beneficio.');
    rec.causali.push('Eseguire detersione e debridement del biofilm prima/insieme all\'antimicrobico topico: l\'antimicrobico da solo non è sufficiente.');
  } else if(s.infezione === 'locale'){
    rec.primaria.push('Medicazione antimicrobica mirata (argento, iodio, PHMB o miele) associata a debridement');
    rec.warnings.push('Segno locale conclamato: integrare con detersione/debridement e rivalutazione ravvicinata.');
  } else if(s.infezione === 'sistemica'){
    rec.danger.push('Segni sistemici di infezione: la priorità è la terapia sistemica (valutazione medica) e il debridement appropriato. Le medicazioni avanzate antimicrobiche vanno usate come supporto, mai come unico trattamento.');
  }

  // --- Layer cute perilesionale ---
  if(s.perilesionale === 'macerata'){
    rec.secondaria.push('Prodotto barriera per la cute perilesionale (pasta o film protettivo)');
    rec.warnings.push('Cute macerata: preferire presidi più assorbenti (foam, idrofibre, superassorbenti) per allontanare l\'essudato dai bordi.');
  } else if(s.perilesionale === 'fragile'){
    rec.evitare.push('Adesivi aggressivi standard');
    rec.secondaria.push('Fissaggio con bordo in silicone o bende non adesive');
    rec.warnings.push('Rischio di skin tear: prediligere medicazioni atraumatiche e rimozione delicata.');
  }

  // --- Layer tipo di ferita (interventi causali) ---
  if(s.tipoFerita === 'ldp'){
    rec.causali.push('Lesione da pressione: nessuna medicazione funziona senza la riduzione della pressione (riposizionamento, superfici antidecubito) e il controllo di frizione/scivolamento.');
    rec.secondaria.push('Preferire medicazioni conformabili con bordo in silicone su sedi di pressione (sacro, tallone, trocantere)');
  } else if(s.tipoFerita === 'venosa'){
    rec.causali.push('Ulcera venosa: la terapia compressiva adeguata è parte integrante del trattamento, non opzionale.');
  } else if(s.tipoFerita === 'arteriosa'){
    rec.danger.push('Ulcera arteriosa (ischemica): la compressione è generalmente controindicata in presenza di insufficienza arteriosa non corretta. È necessaria valutazione vascolare per eventuale rivascolarizzazione.');
  } else if(s.tipoFerita === 'diabetica'){
    rec.causali.push('Piede diabetico: lo scarico (off-loading) della zona di carico è la condizione senza la quale nessuna medicazione è realmente efficace. Monitorare il controllo glicemico.');
  } else if(s.tipoFerita === 'acuta_semplice'){
    rec.causali.push('Ferita acuta semplice a guarigione per prima intenzione: in genere sono sufficienti medicazioni tradizionali sterili asciutte, con cambi frequenti.');
  } else if(s.tipoFerita === 'acuta_complessa'){
    rec.causali.push('Ferita acuta complessa: valutare l\'eventuale necessità di terapia a pressione negativa (NPWT) o medicazioni avanzate assorbenti in combinazione con secondarie.');
  }

  // --- Frequenza cambio ---
  if(s.tessuto === 'necrotico' || s.essudato === 'abbondante'){
    rec.frequenza = 'Medicazioni tradizionali: ogni 24–48 ore. Medicazioni avanzate molto essudative: rivalutare ogni 24–72 ore, accorciando l\'intervallo se l\'essudato supera i bordi della medicazione.';
  } else {
    rec.frequenza = 'Medicazioni avanzate: possono restare in sede 3–7 giorni se l\'essudato è compatibile e non ci sono segni di infezione o leakage.';
  }
  rec.frequenza += ' Cambio anticipato sempre se: essudato che supera i bordi, odore marcato, dolore improvvisamente aumentato, distacco o contaminazione del presidio.';

  // --- Override palliativo ---
  if(isPalliativo){
    rec.palliative.push('Obiettivo di comfort: privilegiare medicazioni atraumatiche (silicone, idrofibre) e superassorbenti/a base di carbone per il controllo di odore, essudato e dolore.');
    rec.palliative.push('Minimizzare il numero e l\'aggressività dei cambi di medicazione.');
    rec.evitare.push('Debridement enzimatico o meccanico aggressivo, se non strettamente necessario per il comfort');
  }

  return rec;
}

function renderResult(){
  const rec = computeResult(state);
  const isPalliativo = state.obiettivo === 'palliazione';

  const tessutoColorMap = {
    necrotico: 'var(--necrosi)',
    slough: 'var(--slough)',
    misto: 'var(--slough)',
    granulazione: 'var(--granulazione)',
    riepitelizzazione: 'var(--riepitelizzazione)'
  };

  function pillList(arr, cls){
    if(!arr.length) return '<span style="color:var(--ink-soft); font-size:13.5px;">Nessuna indicazione specifica.</span>';
    const items = arr.map(t => `
      <div class="item-card ${cls||''}">
        <div class="icon-box">${iconFor(t)}</div>
        <div class="item-label">${t}</div>
      </div>
    `).join('');
    return `<div class="item-grid">${items}</div>`;
  }
  function noteList(arr){
    if(!arr.length) return '';
    return '<ul class="notes">' + arr.map(t=>`<li>${t}</li>`).join('') + '</ul>';
  }

  area.innerHTML = `
    <div class="card">
      <div class="obj-flag">${isPalliativo ? 'Obiettivo: comfort / palliazione' : 'Obiettivo: guarigione'}</div>
      <div class="result-head">
        <div class="dot" style="background:${tessutoColorMap[state.tessuto]||'var(--teal)'}"></div>
        <div class="result-title">Proposta di medicazione</div>
      </div>
      <div class="summary-strip">
        <span>TIPO: ${labelFor('tipoFerita', state.tipoFerita)}</span>
        <span>TESSUTO: ${labelFor('tessuto', state.tessuto)}</span>
        <span>INFEZIONE: ${labelFor('infezione', state.infezione)}</span>
        <span>ESSUDATO: ${labelFor('essudato', state.essudato)}</span>
        <span>PERILESIONALE: ${labelFor('perilesionale', state.perilesionale)}</span>
      </div>

      ${rec.danger.length ? `<div class="danger-box">⚠ ${rec.danger.join('<br><br>')}</div>` : ''}

      <div class="section-block">
        <h3>Medicazione primaria suggerita</h3>
        ${pillList(rec.primaria)}
      </div>

      <div class="section-block">
        <h3>Medicazione secondaria / accessori</h3>
        ${pillList(rec.secondaria)}
      </div>

      <div class="section-block">
        <h3>Da evitare in questo scenario</h3>
        ${pillList(rec.evitare, 'avoid')}
      </div>

      ${rec.palliative.length ? `
      <div class="section-block">
        <h3>Considerazioni palliative</h3>
        ${noteList(rec.palliative)}
      </div>` : ''}

      <div class="section-block">
        <h3>Interventi causali da non dimenticare</h3>
        ${noteList(rec.causali)}
      </div>

      <div class="section-block">
        <h3>Frequenza indicativa del cambio</h3>
        <p style="font-size:14.5px; line-height:1.55; margin:0;">${rec.frequenza}</p>
      </div>

      ${rec.warnings.length ? `<div class="warn-box">${rec.warnings.join('<br><br>')}</div>` : ''}

      <div class="disclaimer">
        Questo percorso applica in modo strutturato il modello T.I.M.E. e i criteri di scelta descritti nel documento caricato (approccio S.T.A.R.T.). Non sostituisce la valutazione clinica diretta, il giudizio del medico/infermiere responsabile né i protocolli aziendali in vigore. In presenza di segni sistemici di infezione, dolore improvviso, sanguinamento o rapido peggioramento, richiedere sempre una rivalutazione medica.
      </div>

      <div class="footer-actions">
        <button class="nav-btn" id="restartBtn" type="button">↺ Ricomincia</button>
        <button class="nav-btn" id="editBtn" type="button">← Modifica risposte</button>
        <button class="nav-btn primary" id="printBtn" type="button">Stampa / salva PDF</button>
      </div>
    </div>
  `;

  document.getElementById('restartBtn').addEventListener('click', ()=>{
    state = {}; current = 0; render();
  });
  document.getElementById('editBtn').addEventListener('click', ()=>{
    current = STEPS.length - 1; render();
  });
  document.getElementById('printBtn').addEventListener('click', ()=>{
    window.print();
  });
}

function labelFor(stepKey, value){
  const step = STEPS.find(s=>s.key===stepKey);
  if(!step) return value;
  const opt = step.options.find(o=>o.value===value);
  return opt ? opt.title : value;
}

render();
</script>
